<script>
async function getData() {
  try {
    let response = await fetch("https://api.thingspeak.com/channels/3332344/feeds.json?api_key=70625VXMQNFXP7XD");
    let data = await response.json();

    let last = data.feeds[data.feeds.length - 1];

    let temp = last.field1;
    let hum = last.field2;
    let water = last.field3;

    document.getElementById("temp").innerText = temp;
    document.getElementById("hum").innerText = hum;
    document.getElementById("water").innerText = water;

    // Pump logic (auto)
    if (water < 10) {
      document.getElementById("pump").innerText = "ON";
    } else {
      document.getElementById("pump").innerText = "OFF";
    }

  } catch (error) {
    console.log("Error fetching data:", error);
  }
}

// Auto refresh every 5 seconds
setInterval(getData, 5000);
getData();
</script>

<!DOCTYPE html>
<html>
<head>
  <title>Hydroponics Dashboard</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }
    .box {
      margin-top: 100px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🌱 Smart Hydroponics Dashboard</h2>

  <p>Temperature: <span id="temp">Loading...</span></p>
  <p>Humidity: <span id="hum">Loading...</span></p>
  <p>Water Level: <span id="water">Loading...</span></p>
  <p>Pump: <span id="pump">--</span></p>
</div>

<script>
async function getData() {
  try {
    const res = await fetch("https://api.thingspeak.com/channels/3332344/feeds.json?api_key=70625VXMQNFXP7XD");
    const data = await res.json();

    if (!data.feeds || data.feeds.length === 0) {
      showNoData();
      return;
    }

    let last = data.feeds[data.feeds.length - 1];

    let temp = parseFloat(last.field1);
    let hum = parseFloat(last.field2);
    let water = parseFloat(last.field3);

    if (isNaN(temp) || isNaN(hum) || isNaN(water) || temp === 0) {
      showNoData();
      return;
    }

    document.getElementById("temp").innerText = temp;
    document.getElementById("hum").innerText = hum;
    document.getElementById("water").innerText = water;

    let pump = document.getElementById("pump");

    if (water < 10) {
      pump.innerText = "ON";
      pump.style.color = "red";
    } else {
      pump.innerText = "OFF";
      pump.style.color = "green";
    }

  } catch (e) {
    console.log(e);
    showNoData();
  }
}

function showNoData() {
  document.getElementById("temp").innerText = "No Data";
  document.getElementById("hum").innerText = "No Data";
  document.getElementById("water").innerText = "No Data";
  document.getElementById("pump").innerText = "--";
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>

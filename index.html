<script>
async function getData() {
  try {
    let response = await fetch("https://api.thingspeak.com/channels/3332344/feeds.json?api_key=70625VXMQNFXP7XD");
    let data = await response.json();

    if (!data.feeds || data.feeds.length === 0) return;

    // Find last valid entry
    let last = [...data.feeds].reverse().find(item =>
      item.field1 !== null &&
      item.field2 !== null &&
      item.field3 !== null &&
      item.field1 !== "0.00"
    );

    if (!last) return;

    let temp = last.field1;
    let hum = last.field2;
    let water = last.field3;

    document.getElementById("temp").innerText = temp;
    document.getElementById("hum").innerText = hum;
    document.getElementById("water").innerText = water;

    let pump = document.getElementById("pump");

    if (Number(water) < 10) {
      pump.innerText = "ON";
      pump.style.color = "red";
    } else {
      pump.innerText = "OFF";
      pump.style.color = "lightgreen";
    }

  } catch (error) {
    console.log("Error:", error);
  }
}

setInterval(getData, 5000);
getData();
</script>

<!DOCTYPE html>
<html>
<head>
  <title>Login - Hydroponics System</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(rgba(0,80,0,0.6), rgba(0,80,0,0.6)),
      url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");
      background-size: cover;
    }
    .login-box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      color: white;
    }
    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      background: #2ecc71;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>🌱 Hydroponics Login</h2>
  <input type="text" placeholder="Username" id="username">
  <input type="password" placeholder="Password" id="password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "team03" && pass === "4141") {
    localStorage.setItem("loggedIn","true");
    window.location.href = "index.html";
  } else {
    alert("Invalid Login");
  }
}
</script>

</body>
</html>
